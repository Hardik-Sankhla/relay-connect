name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_crypto.py \
            tests/test_protocol.py \
            tests/test_config.py \
            tests/test_cli.py \
            -v --tb=short

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration.py \
            -v --tb=short --timeout=30

      - name: Coverage report
        run: |
          python -m pytest tests/ \
            --cov=relay \
            --cov-report=term-missing \
            --cov-fail-under=70
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check relay/ --select=E,F,W --ignore=E501
        continue-on-error: true

  security:
    name: Security scan (no private keys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for private key patterns
        run: |
          if grep -r "BEGIN.*PRIVATE KEY" . --include="*.py" --include="*.pem" --include="*.key" --exclude-dir=".git"; then
            echo "ERROR: Private key found in repo"
            exit 1
          fi
          echo "Clean — no private keys found"
